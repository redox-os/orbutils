build:redox:
  stage: build
  before_script:
    - apt-get update
    - apt-get install libfontconfig -y
  script:
    - redoxer build --bin launcher
    - redoxer build --bin orblogin
    - redoxer build --bin calendar
    - redoxer build --bin calculator
    - redoxer build --bin viewer
